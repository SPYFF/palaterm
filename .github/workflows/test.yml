name: test

on:
  push:
    branches: [main]
    tags: ["*"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    container: ghcr.io/astral-sh/uv:python${{ matrix.python-version }}-bookworm-slim
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    env:
      UV_LINK_MODE: copy
      UV_CACHE_DIR: /tmp/uv-cache

    steps:
      - uses: actions/checkout@v4

      - name: Cache uv downloads
        uses: actions/cache@v4
        with:
          path: /tmp/uv-cache
          key: uv-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            uv-${{ matrix.python-version }}-

      - name: Show uv version
        run: uv --version

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest -q
