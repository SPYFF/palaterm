stages:
  - test

test:
  stage: test
  image: ghcr.io/astral-sh/uv:python${PYTHON_VERSION}-bookworm-slim
  parallel:
    matrix:
      - PYTHON_VERSION: ["3.11", "3.12", "3.13"]
  variables:
    UV_CACHE_DIR: .uv-cache
    UV_LINK_MODE: copy
  cache:
    key:
      files:
        - uv.lock
      prefix: "py${PYTHON_VERSION}"
    paths:
      - .uv-cache/
  before_script:
    - uv --version
    - uv sync --frozen
  script:
    - uv run pytest -q
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
